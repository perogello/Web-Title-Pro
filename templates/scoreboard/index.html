<link rel="stylesheet" href="./styles.css" />
<div class="score-root" data-outro-ms="300">
  <div class="score-team">
    <span class="score-label" data-field="homeTeam" data-label="Home Team">LIONS</span>
    <strong data-field="homeScore" data-label="Home Score">2</strong>
  </div>
  <div class="score-center">
    <span class="score-period" data-field="period" data-label="Period">Q4</span>
    <span class="score-timer" data-timer="main" data-label="Main Timer">00:30.0</span>
  </div>
  <div class="score-team">
    <span class="score-label" data-field="awayTeam" data-label="Away Team">EAGLES</span>
    <strong data-field="awayScore" data-label="Away Score">1</strong>
  </div>
</div>
