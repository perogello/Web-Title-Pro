<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; height: 100%; background: transparent; font-family: system-ui, Segoe UI, Roboto, sans-serif; }
      .lt {
        position: absolute;
        left: 80px;
        bottom: 90px;
        min-width: 520px;
        padding: 18px 28px;
        border-radius: 14px;
        background: linear-gradient(180deg, #1b8f5a, #0f6d42);
        color: #fff;
        box-shadow: 0 10px 34px rgba(0, 0, 0, 0.45);
      }
      .lt .title { font-size: 46px; font-weight: 800; line-height: 1.05; }
      .lt .subtitle { font-size: 24px; font-weight: 600; opacity: 0.9; margin-top: 4px; }
    </style>
  </head>
  <body>
    <div class="lt">
      <div class="title" data-field="title" data-label="Title">Winner</div>
      <div class="subtitle" data-field="subtitle" data-label="Subtitle">Bingo!</div>
    </div>
  </body>
</html>
