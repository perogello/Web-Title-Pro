<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Title Pro Loading</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Bahnschrift, "Segoe UI Variable Text", "Segoe UI", sans-serif;
        --bg: #090a0d;
        --panel: rgba(18, 21, 27, 0.96);
        --edge: rgba(255, 255, 255, 0.08);
        --text-dim: #9ea7b6;
        --red: #ff5d6d;
        --green: #5ddb92;
      }

      * { box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(93, 219, 146, 0.16), transparent 34%),
          radial-gradient(circle at bottom right, rgba(255, 93, 109, 0.14), transparent 28%),
          linear-gradient(180deg, #111317 0%, var(--bg) 100%);
        color: #f5f7fb;
      }

      body {
        display: grid;
        place-items: center;
        padding: 18px;
      }

      .shell {
        width: 100%;
        max-width: 520px;
        padding: 24px 24px 20px;
        border-radius: 20px;
        background: var(--panel);
        border: 1px solid var(--edge);
        box-shadow: 0 20px 42px rgba(0, 0, 0, 0.34);
      }

      .eyebrow {
        color: var(--text-dim);
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 8px 0 6px;
        font-size: 34px;
        line-height: 1;
      }

      .status {
        margin: 0;
        color: var(--text-dim);
        font-size: 15px;
      }

      .bar-shell {
        margin-top: 22px;
        width: 100%;
        height: 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .bar {
        width: 12%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--green), var(--red));
        box-shadow: 0 0 24px rgba(255, 93, 109, 0.28);
        transition: width 220ms ease;
      }

      .meta {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-top: 12px;
        color: var(--text-dim);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="eyebrow">Broadcast Title Control</div>
      <h1>Web Title Pro</h1>
      <p class="status" id="status">Запуск приложения...</p>
      <div class="bar-shell">
        <div class="bar" id="bar"></div>
      </div>
      <div class="meta">
        <span id="step">Preparing</span>
        <span id="percent">12%</span>
      </div>
    </div>
    <script>
      window.setLoadingState = (label, percent) => {
        const safePercent = Math.max(8, Math.min(100, Number(percent || 0)));
        document.getElementById('status').textContent = label || 'Запуск приложения...';
        document.getElementById('step').textContent = label || 'Preparing';
        document.getElementById('percent').textContent = `${safePercent}%`;
        document.getElementById('bar').style.width = `${safePercent}%`;
      };
    </script>
  </body>
</html>
