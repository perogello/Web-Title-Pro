<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Title Pro</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", "YS Text", "Segoe UI Variable Text", system-ui, sans-serif;
        /* Palette mirrors `.shell-v2` in client/src/styles/01-base.css.
           Keep these in sync — splash must look like it belongs to the
           same app, not a separate older window. */
        --bg: #050507;
        --bg-2: #101012;
        --card: #16161a;
        --card-2: #1d1d21;
        --border: #2a2a2e;
        --border-strong: #3a3a40;
        --text: #f2f3f5;
        --text-dim: #9a9aa0;
        --text-faint: #65656b;
        --accent: #8b9eff;
        --good: #00b86b;
        --live: #f93232;
      }

      * { box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
      }

      body {
        display: grid;
        place-items: center;
        padding: 16px;
        -webkit-app-region: drag;
      }

      .shell {
        width: 100%;
        max-width: 480px;
        padding: 28px 28px 22px;
        border-radius: 12px;
        background: var(--card);
        border: 1px solid var(--border);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.6);
      }

      .head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 20px;
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }

      .eyebrow {
        color: var(--text-faint);
        font-size: 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-weight: 600;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.15;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .version {
        font-size: 11px;
        color: var(--text-faint);
        font-variant-numeric: tabular-nums;
        padding: 3px 8px;
        background: var(--bg-2);
        border: 1px solid var(--border);
        border-radius: 4px;
        flex-shrink: 0;
      }

      .status {
        margin: 0 0 14px;
        color: var(--text);
        font-size: 13px;
        line-height: 1.4;
        min-height: 18px;
      }

      .bar-shell {
        width: 100%;
        height: 4px;
        border-radius: 2px;
        background: var(--bg-2);
        overflow: hidden;
        position: relative;
      }

      .bar {
        width: 8%;
        height: 100%;
        border-radius: inherit;
        background: var(--accent);
        transition: width 220ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-top: 12px;
        color: var(--text-dim);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
      }

      .meta .percent {
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="head">
        <div class="brand">
          <div class="eyebrow" id="eyebrow">Broadcast Title Control</div>
          <h1 id="title">Web Title Pro</h1>
        </div>
        <span class="version" id="version"></span>
      </div>
      <p class="status" id="status">Launching application...</p>
      <div class="bar-shell">
        <div class="bar" id="bar"></div>
      </div>
      <div class="meta">
        <span id="step">Preparing</span>
        <span class="percent" id="percent">8%</span>
      </div>
    </div>
    <script>
      window.setShellMeta = (meta) => {
        const nextTitle = meta && meta.title ? meta.title : 'Web Title Pro';
        const nextEyebrow = meta && meta.eyebrow ? meta.eyebrow : 'Broadcast Title Control';
        const nextVersion = meta && meta.version ? `v${meta.version}` : '';
        document.title = nextTitle;
        document.getElementById('title').textContent = nextTitle;
        document.getElementById('eyebrow').textContent = nextEyebrow;
        document.getElementById('version').textContent = nextVersion;
      };

      window.setLoadingState = (label, percent) => {
        const safePercent = Math.max(8, Math.min(100, Number(percent || 0)));
        document.getElementById('status').textContent = label || 'Launching application...';
        document.getElementById('step').textContent = label || 'Preparing';
        document.getElementById('percent').textContent = `${Math.round(safePercent)}%`;
        document.getElementById('bar').style.width = `${safePercent}%`;
      };
    </script>
  </body>
</html>
